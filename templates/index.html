<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Status</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Ctext x='32' y='42' font-size='32' text-anchor='middle' fill='%23facc15'%3E%E2%82%BF%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        --accent: #ffb703;
      }

      body {
        margin: 0;
        padding: clamp(1rem, 3vw, 2.5rem);
        background: #0f172a;
        color: #e2e8f0;
      }

      body.reveal-ready [data-reveal],
      body.reveal-ready [data-child-reveal] {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.6s ease, transform 0.6s ease;
        transition-delay: calc(var(--reveal-order, 0) * 140ms);
        will-change: opacity, transform;
      }

      body.reveal-ready [data-reveal].is-visible,
      body.reveal-ready [data-child-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (prefers-reduced-motion: reduce) {
        body.reveal-ready [data-reveal],
        body.reveal-ready [data-child-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }

      h1,
      h2 {
        margin: 0;
        font-size: 2rem;
      }

      h2 {
        font-size: 1.4rem;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        width: min(1400px, 100%);
        margin: 0 auto;
        box-sizing: border-box;
      }

      .card {
        background: #1e293b;
        padding: 1.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.4);
        width: 100%;
      }

      .device-header {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }

      th {
        text-align: left;
        font-size: 0.9rem;
        color: #94a3b8;
        font-weight: 500;
      }

      td {
        padding: 0.75rem 0 0.75rem 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .clickable-row {
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
      }

      .clickable-row:hover {
        background: rgba(148, 163, 184, 0.08);
        transform: translateY(-1px);
      }

      .price {
        font-size: 1.2rem;
        font-weight: 600;
      }

      .change {
        font-weight: 600;
      }

      .change.positive {
        color: #4ade80;
      }

      .change.negative {
        color: #fb7185;
      }

      .meta {
        display: flex;
        gap: 1rem;
        align-items: center;
        color: #94a3b8;
        font-size: 0.9rem;
      }

      .chart-wrapper {
        width: 100%;
        height: clamp(220px, 35vh, 360px);
        margin-top: 1.5rem;
        position: relative;
      }

      .chart-mini {
        margin-top: 0.75rem;
      }

      .chart-label {
        font-size: 0.8rem;
        color: #cbd5f5;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .chart-wrapper.mini-chart {
        height: clamp(150px, 28vh, 220px);
        margin-top: 0.35rem;
        border: 1px dashed rgba(148, 163, 184, 0.3);
        border-radius: 0.65rem;
        padding: 0.35rem;
        background: rgba(15, 23, 42, 0.35);
      }

      .status-legend {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.65rem;
        margin-top: 0.5rem;
        color: #cbd5f5;
        font-size: 0.9rem;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.6rem;
        border-radius: 0.5rem;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }

      .legend-swatch {
        width: 14px;
        height: 14px;
        border-radius: 0.35rem;
        border: 1px solid rgba(148, 163, 184, 0.5);
      }

      .legend-swatch.offline {
        background: rgba(239, 68, 68, 0.3);
        border-color: rgba(248, 113, 113, 0.8);
      }

      .legend-swatch.power {
        background: rgba(148, 163, 184, 0.25);
        border-color: rgba(148, 163, 184, 0.8);
      }

      .metrics-group {
        margin-top: 1.25rem;
        padding: 1rem;
        border-radius: 0.75rem;
        background: rgba(15, 23, 42, 0.45);
        border: 1px solid rgba(148, 163, 184, 0.18);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .highlight {
        margin-top: 1.5rem;
        padding: 1.25rem;
        border-radius: 0.75rem;
        background: linear-gradient(120deg, rgba(248, 4, 33, 0.25), rgba(15, 23, 42, 0.65));
        border: 1px solid rgba(248, 4, 33, 0.35);
      }

      .highlight .label {
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #fecdd3;
        margin-bottom: 0.35rem;
      }

      .highlight .value {
        font-size: 2rem;
        font-weight: 700;
        color: #f8fafc;
      }

      .sub-highlight {
        margin-top: 0.9rem;
        padding: 0.9rem 1rem;
        border-radius: 0.65rem;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #fecdd3;
        font-size: 0.95rem;
      }

      .sub-highlight .label {
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.7rem;
        color: #f9a8d4;
      }

      .sub-highlight .value {
        font-weight: 700;
        color: #fef2f2;
      }

      .quote-card {
        background: #0b1220;
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #e2e8f0;
        padding: 1.4rem;
        border-radius: 0.85rem;
        box-shadow: 0 8px 22px rgba(10, 17, 30, 0.45);
        width: 100%;
      }

      .quote-title {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.9rem;
        color: #93c5fd;
        margin-bottom: 0.55rem;
      }

      .quote-text {
        font-size: 1.15rem;
        line-height: 1.6;
        color: #f8fafc;
        white-space: pre-line;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        font-size: 0.85rem;
        color: #cbd5f5;
      }

      .metric-row .label {
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #94a3b8;
        font-size: 0.65rem;
      }

      .metric-row .value {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .error {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background: rgba(251, 113, 133, 0.15);
        color: #fecdd3;
      }

      .plots-grid {
        margin-top: 1.1rem;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 1rem;
        width: 100%;
      }

      .plot-card {
        background: #0b1220;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 0.7rem;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .plot-card img {
        width: 100%;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: #0f172a;
      }

      .plot-title {
        font-weight: 700;
        color: #e2e8f0;
      }

      .plot-meta {
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .scanner-highlight {
        margin-top: 1rem;
        background: linear-gradient(120deg, rgba(251, 146, 60, 0.35), rgba(15, 23, 42, 0.65));
        border: 1px solid rgba(251, 146, 60, 0.6);
      }

      .scanner-highlight .label {
        color: #fed7aa;
      }

      .scanner-highlight .value {
        font-size: clamp(2rem, 5vw, 3rem);
        color: #fff7ed;
      }

      .scanner-secondary-highlight {
        margin-top: 0.75rem;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(125, 211, 252, 0.35);
      }

      .scanner-secondary-highlight .label {
        color: #bae6fd;
      }

      .scanner-secondary-highlight .value {
        font-size: clamp(1.2rem, 3vw, 1.7rem);
        color: #e0f2fe;
      }

      .table-scroll {
        width: 100%;
        overflow-x: auto;
      }

        .table-scroll table {
          min-width: 640px;
        }

        .sparkline {
          display: inline-flex;
          align-items: center;
          min-width: 120px;
        }

        .sparkline svg {
          width: 120px;
          height: 28px;
          display: block;
        }

      @media (max-width: 640px) {
        h1 {
          font-size: 1.6rem;
        }

        h2 {
          font-size: 1.2rem;
        }

        .meta {
          flex-wrap: wrap;
          gap: 0.5rem;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  </head>
  <body>
    <div class="stack">
      <section class="card" data-reveal data-reveal-order="0">
        <h1>Markets and stocks</h1>
        <div class="meta">
          <div>
            Last update:

        <div id="error" class="error" style="display: none"></div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Asset</th>
                <th>Price (USD)</th>
                <th>30d spark</th>
                <th>Change 24h</th>
                <th>Change 7d</th>
                <th>Change 30d</th>

            </thead>
            <tbody id="prices-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card" id="device-card" data-reveal data-reveal-order="1" style="display: none">
        <div class="device-header">
          <h2 id="device-title">AxeOS</h2>
          <div id="device-subtitle" class="meta"></div>
        </div>
        <div id="device-highlight" class="highlight" style="display: none">
          <div class="label" id="highlight-label"></div>

          <h2 id="pi-title">Raspberry Pi</h2>
        </div>
        <div id="pi-highlight" class="highlight" style="display: none">
          <div class="label" id="pi-highlight-label"></div>
          <div class="value" id="pi-highlight-value"></div>

        <div id="pi-subtitle" class="meta"></div>
        <div class="chart-wrapper" id="pi-chart-wrapper" style="display: none">

        <div class="chart-mini" id="pi-full-chart-container" style="display: none">
          <div class="chart-label">Full history</div>
          <div class="chart-wrapper mini-chart">
            <canvas id="pi-full-chart"></canvas>

        </div>
        <div class="status-legend" id="pi-status-legend">
          <div class="legend-item" id="legend-offline">
            <span class="legend-swatch offline"></span>

          </div>
          <div class="legend-item" id="legend-power">
            <span class="legend-swatch power"></span>
            <span>No power / script stopped</span>

        </div>
        <div class="metrics-group" id="pi-metrics"></div>
      </section>

      <section class="quote-card" id="quote-card" data-reveal data-reveal-order="3" style="display: none">
        <div class="quote-title">Quote of the day — A Course in Miracles</div>
        <div class="quote-text" id="quote-text"></div>
      </section>

      <section class="card" id="port-block-card" data-reveal data-reveal-order="4" style="display: none">
        <div class="device-header">
          <h2>UFW blocks</h2>
          <div id="port-block-subtitle" class="meta"></div>
          <div id="port-block-report" class="meta" style="display: none"></div>
        </div>
        <div id="port-block-scanner-highlight" class="highlight scanner-highlight" style="display: none">
          <div class="label">24Hs monitoring count</div>
          <div class="value" id="port-block-scanner-value"></div>
        </div>
        <div id="port-block-unique-highlight" class="highlight scanner-secondary-highlight" style="display: none">
          <div class="label">Unique source IPs (24h)</div>
          <div class="value" id="port-block-unique-value"></div>
        </div>
        <div id="port-block-plots" class="plots-grid"></div>
        <div id="port-block-error" class="error" style="display: none"></div>
      </section>
    </div>

    <script>
      const initialData = {{ initial_data | tojson }};
      const initialError = {{ initial_error | tojson }};
      const initialSystem = {{ initial_system | tojson }};
      const initialBitaxeBestHistory = {{ initial_bitaxe_best_history | tojson }};
      const initialPi = {{ initial_pi | tojson }};
      const initialPiHistory = {{ initial_pi_history | tojson }};
      const initialPiHistoryFull = {{ initial_pi_history_full | tojson }};
      const initialInternetMonitorHistory = {{ initial_internet_monitor_history | tojson }};
      const initialQuote = {{ initial_quote | tojson }};
      const initialPortBlock = {{ initial_port_block | tojson }};
      const authToken = new URLSearchParams(window.location.search).get("token");
      const pricesBody = document.getElementById("prices-body");
      const errorBox = document.getElementById("error");
      const updatedAt = document.getElementById("updated-at");
      const quoteCard = document.getElementById("quote-card");
      const quoteText = document.getElementById("quote-text");
      const deviceCard = document.getElementById("device-card");
      const deviceTitle = document.getElementById("device-title");
      const deviceSubtitle = document.getElementById("device-subtitle");
      const deviceMetrics = document.getElementById("device-metrics");
      const deviceHighlight = document.getElementById("device-highlight");
      const highlightLabel = document.getElementById("highlight-label");
      const highlightValue = document.getElementById("highlight-value");
      const sessionHighlight = document.getElementById("session-highlight");
      const sessionHighlightLabel = document.getElementById("session-highlight-label");
      const sessionHighlightValue = document.getElementById("session-highlight-value");
      const bitaxeBestChartContainer = document.getElementById("bitaxe-best-chart-container");
      const bitaxeBestChartCanvas = document.getElementById("bitaxe-best-chart");
      const piCard = document.getElementById("pi-card");
      const piTitle = document.getElementById("pi-title");
      const piSubtitle = document.getElementById("pi-subtitle");
      const piMetrics = document.getElementById("pi-metrics");
      const piHighlight = document.getElementById("pi-highlight");
      const piHighlightLabel = document.getElementById("pi-highlight-label");
      const piHighlightValue = document.getElementById("pi-highlight-value");
      const piChartWrapper = document.getElementById("pi-chart-wrapper");
      const piChartCanvas = document.getElementById("pi-chart");
      const piFullChartContainer = document.getElementById("pi-full-chart-container");
      const piFullChartCanvas = document.getElementById("pi-full-chart");
      const piStatusLegend = document.getElementById("pi-status-legend");
      const legendOffline = document.getElementById("legend-offline");
      const legendPower = document.getElementById("legend-power");
      const portBlockCard = document.getElementById("port-block-card");
      const portBlockSubtitle = document.getElementById("port-block-subtitle");
      const portBlockReport = document.getElementById("port-block-report");
      const portBlockScannerHighlight = document.getElementById("port-block-scanner-highlight");
      const portBlockScannerValue = document.getElementById("port-block-scanner-value");
      const portBlockUniqueHighlight = document.getElementById("port-block-unique-highlight");
      const portBlockUniqueValue = document.getElementById("port-block-unique-value");
      const portBlockPlots = document.getElementById("port-block-plots");
      const portBlockError = document.getElementById("port-block-error");
      const PORT_BLOCK_REFRESH_MS = 15 * 60 * 1000;
      let piChart = null;
      let piFullChart = null;
      let bitaxeBestChart = null;
      const revealedKeys = new Set();

      const STATUS_COLORS = {
        offline: "rgba(248, 113, 113, 0.36)",
        offlineBorder: "rgba(248, 113, 113, 0.92)",
        offlineText: "#fecdd3",
        power: "rgba(148, 163, 184, 0.18)",
      };

      const formatter = new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2,
      });

      function formatChange(value) {
        return Number.isFinite(value) ? `${value.toFixed(2)}%` : "—";
      }

      function changeClass(value) {
        if (!Number.isFinite(value)) return "";
        return value >= 0 ? "positive" : "negative";
      }

      function formatDifficulty(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric) || numeric <= 0) return "—";
        const units = ["", "K", "M", "G", "T", "P"];
        let val = numeric;
        let unitIndex = 0;
        while (val >= 1000 && unitIndex < units.length - 1) {
          val /= 1000;
          unitIndex += 1;
        }
        const rounded = val >= 100 ? val.toFixed(0) : val >= 10 ? val.toFixed(1) : val.toFixed(2);
        return `${rounded}${units[unitIndex]}`;
      }

      document.body.classList.add("reveal-ready");

      function revealAfterDelay(targets, delayMs = 320) {
        const elements = Array.from(targets || []);
        if (!elements.length) return;
        setTimeout(() => {
          elements.forEach((el, index) => {
            const order = Number(el.dataset.revealOrder);
            const safeOrder = Number.isFinite(order) ? order : index;
            el.style.setProperty("--reveal-order", safeOrder);
            el.classList.add("is-visible");
          });
        }, delayMs);
      }

      function sequentialReveal(targets, { onceKey, delayStep = 140, baseDelay = 120 } = {}) {
        const elements = Array.from(targets || []);
        if (!elements.length) return;
        const shouldAnimate = onceKey ? !revealedKeys.has(onceKey) : true;
        elements.forEach((el, idx) => {
          const orderValue = Number(el.dataset.revealOrder);
          const order = Number.isFinite(orderValue) ? orderValue : idx;
          el.style.setProperty("--reveal-order", order);
          el.classList.remove("is-visible");
          if (!shouldAnimate) {
            el.classList.add("is-visible");
            return;
          }
          setTimeout(() => {
            if (!document.body.contains(el)) return;
            el.classList.add("is-visible");
          }, baseDelay + delayStep * idx);
        });
        if (shouldAnimate && onceKey) {
          revealedKeys.add(onceKey);
        }
      }

      revealAfterDelay(document.querySelectorAll("[data-reveal]"));

      const statusOverlayPlugin = {
        id: "statusOverlay",
        beforeDatasetsDraw(chart) {
          if (!chart?.$statusOverlayOnTop) {
            drawStatusOverlay(chart);
          }
        },
        afterDatasetsDraw(chart) {
          if (chart?.$statusOverlayOnTop) {
            drawStatusOverlay(chart);
          }
        },
      };

      function drawStatusOverlay(chart) {
        const overlay = chart?.$statusOverlays;
        if (!overlay) return;
        const { ctx, chartArea, scales } = chart;
        if (!ctx || !chartArea || !scales?.x) return;
        const top = chartArea.top;
        const bottom = chartArea.bottom;
        const emphasis = chart.$statusOverlayEmphasis;
        const offlineFill = emphasis ? "rgba(248, 113, 113, 0.6)" : STATUS_COLORS.offline;
        const offlineBorder = emphasis ? "rgba(248, 113, 113, 0.95)" : STATUS_COLORS.offlineBorder;
        const offlineText = emphasis ? "#ffe4e6" : STATUS_COLORS.offlineText;
        ctx.save();

        const drawSpan = (span, color, options = {}) => {
          if (!span?.start || !span?.end) return;
          const startX = scales.x.getPixelForValue(span.start);
          const endX = scales.x.getPixelForValue(span.end);
          if (!Number.isFinite(startX) || !Number.isFinite(endX)) return;
          const left = Math.min(startX, endX);
          const width = Math.abs(endX - startX);
          if (width < 2) return;
          ctx.fillStyle = color;
          ctx.fillRect(left, top, width, bottom - top);
          if (options.outlineColor) {
            ctx.strokeStyle = options.outlineColor;
            ctx.lineWidth = emphasis ? 2.5 : 2;
            ctx.beginPath();
            ctx.moveTo(left, top);
            ctx.lineTo(left, bottom);
            ctx.moveTo(left + width, top);
            ctx.lineTo(left + width, bottom);
            ctx.stroke();
          }
          if (options.label && width > (options.labelMinWidth || 48)) {
            ctx.font = "600 11px Inter, system-ui, -apple-system, sans-serif";
            ctx.fillStyle = options.labelColor || options.outlineColor || color;
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.shadowColor = "rgba(0,0,0,0.45)";
            ctx.shadowBlur = 8;
            ctx.fillText(options.label, left + width / 2, top + 6);
            ctx.shadowBlur = 0;
          }
        };

        (overlay.powerSpans || []).forEach((span) => drawSpan(span, STATUS_COLORS.power));
        (overlay.offlineSpans || []).forEach((span) =>
          drawSpan(span, offlineFill, {
            outlineColor: offlineBorder,
            label: "OFFLINE",
            labelColor: offlineText,
            labelMinWidth: 56,
          })
        );
        ctx.restore();
      }

      Chart.register(statusOverlayPlugin);

      function median(values) {
        if (!Array.isArray(values) || !values.length) return null;
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        if (sorted.length % 2 === 0) {
          return (sorted[mid - 1] + sorted[mid]) / 2;
        }
        return sorted[mid];
      }

      function computeExpectedIntervalMs(points) {
        if (!Array.isArray(points) || points.length < 2) return 60000;
        const gaps = [];
        for (let i = 1; i < points.length; i += 1) {
          const delta = points[i].x - points[i - 1].x;
          if (Number.isFinite(delta) && delta > 0) {
            gaps.push(delta);
          }
        }
        const med = median(gaps);
        if (Number.isFinite(med) && med > 0) return med;
        return 60000;
      }

      function buildPowerSpans(points, expectedMs) {
        if (!Array.isArray(points) || points.length < 2) return [];
        const spans = [];
        const threshold = Math.max(expectedMs * 2.5, expectedMs + 90000);
        for (let i = 1; i < points.length; i += 1) {
          const gap = points[i].x - points[i - 1].x;
          if (gap > threshold) {
            spans.push({ start: points[i - 1].x, end: points[i].x });
          }
        }
        return spans;
      }

      function buildOfflineSpans(points, expectedMs) {
        if (!Array.isArray(points) || !points.length) return [];
        const spans = [];
        let currentStart = null;
        for (let i = 0; i < points.length; i += 1) {
          const online = points[i].online;
          if (online === false && !currentStart) {
            currentStart = points[i].x;
          }
          if ((online !== false || i === points.length - 1) && currentStart) {
            const end =
              online === false && i === points.length - 1
                ? new Date(points[i].x.getTime() + expectedMs)
                : points[i].x;
            spans.push({ start: currentStart, end });
            currentStart = null;
          }
        }
        return spans;
      }

      function buildStatusOverlay(points) {
        if (!Array.isArray(points) || !points.length) {
          return { offlineSpans: [], powerSpans: [] };
        }
        const expectedMs = computeExpectedIntervalMs(points);
        return {
          offlineSpans: buildOfflineSpans(points, expectedMs),
          powerSpans: buildPowerSpans(points, expectedMs),
        };
      }

      function cacheBustedUrl(url, version) {
        const params = [];
        if (authToken) params.push(`token=${encodeURIComponent(authToken)}`);
        if (version) params.push(`v=${encodeURIComponent(version)}`);
        if (!params.length) return url;
        const separator = url.includes("?") ? "&" : "?";
        return `${url}${separator}${params.join("&")}`;
      }

      function renderSparkline(points) {
        if (!Array.isArray(points) || !points.length) return "—";

        const values = points.map((p) => Number(p.v)).filter((v) => Number.isFinite(v));
        if (!values.length) return "—";

        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = max - min || 1;
        const width = 120;
        const height = 28;
        const step = values.length > 1 ? width / (values.length - 1) : width;

        const coords = values
          .map((v, idx) => {
            const x = idx * step;
            const y = height - ((v - min) / range) * height;
            return `${x.toFixed(2)},${y.toFixed(2)}`;
          })
          .join(" ");

        return `
          <span class="sparkline">
            <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
              <polyline
                fill="none"
                stroke="${values[values.length - 1] >= values[0] ? "#34d399" : "#f87171"}"
                stroke-width="2"
                points="${coords}"
              />
            </svg>
          </span>
        `;
      }

      function formatQuoteForDisplay(text) {
        const cleaned = String(text || "").replace(/\s+/g, " ").trim();
        if (!cleaned) {
          return "";
        }
        const verses = cleaned.split(/(?<=[.!?])\s+/).filter(Boolean);
        return verses.length > 1 ? verses.join("\n\n") : cleaned;
      }

      function normalizeBitaxeHistory(history) {
        const labels = Array.isArray(history?.labels) ? history.labels : [];
        const values = Array.isArray(history?.best_session) ? history.best_session : [];
        const displays = Array.isArray(history?.display) ? history.display : [];
        const points = [];
        const length = Math.min(labels.length, values.length);
        for (let i = 0; i < length; i += 1) {
          const label = labels[i];
          const value = Number(values[i]);
          if (!label || !Number.isFinite(value)) continue;
          const display = displays[i] || formatDifficulty(value);
          points.push({ x: new Date(label), y: value, display });
        }
        return points;
      }

          formatSubtitle(meta) {

              if (!Number.isNaN(updated.getTime())) {

                  hour: "2-digit",

            return "";

      function normalizeHistory(history) {
        const safe = history || {};
        const length = safe.labels?.length || 0;
        const points = [];
        for (let i = 0; i < length; i += 1) {
          const label = safe.labels[i];
          if (!label) continue;
          const onlineRaw = Array.isArray(safe.online) ? safe.online[i] : undefined;
          const online =
            onlineRaw === true ? true : onlineRaw === false ? false : onlineRaw === 0 ? false : null;
          points.push({
            x: new Date(label),
            temperature: safe.temperature?.[i] ?? null,
            cpu: safe.cpu?.[i] ?? null,
            ram: safe.ram?.[i] ?? null,
            fan: safe.fan?.[i] ?? null,
            online,
          });
        }
        return points;
      }

      function normalizeInternetHistory(history) {
        const safe = history || {};
        const labels = Array.isArray(safe.labels) ? safe.labels : [];
        const speeds = Array.isArray(safe.speed_kbps) ? safe.speed_kbps : [];
        const status = Array.isArray(safe.status) ? safe.status : [];
        const points = [];
        const length = Math.min(labels.length, speeds.length);
        for (let i = 0; i < length; i += 1) {
          const label = labels[i];
          if (!label) continue;
          const x = new Date(label);
          if (Number.isNaN(x.getTime())) continue;
          const speed = Number(speeds[i]);
          points.push({
            x,
            speed: Number.isFinite(speed) ? speed : null,
            status: status?.[i] || null,
          });
        }
        return points;
      }

      function updateBitaxeBestChart(history) {
        if (!bitaxeBestChartCanvas || !bitaxeBestChartContainer) return;
        const points = normalizeBitaxeHistory(history);
        if (!points.length) {
          bitaxeBestChartContainer.style.display = "none";
          if (bitaxeBestChart) {
            bitaxeBestChart.data.labels = [];
            bitaxeBestChart.data.datasets.forEach((dataset) => (dataset.data = []));
            bitaxeBestChart.update("none");
          }
          return;
        }

        const labels = points.map((point) => point.x);
        const data = points.map((point) => ({ x: point.x, y: point.y, display: point.display }));
        const dataLog = points.map((point) => ({
          x: point.x,
          y: Number.isFinite(point.y) && point.y > 0 ? point.y : null,
          display: point.display,
        }));
        bitaxeBestChartContainer.style.display = "block";
        const values = points.map((point) => point.y).filter((v) => Number.isFinite(v));
        const minValue = values.length ? Math.min(...values) : null;
        const maxValue = values.length ? Math.max(...values) : null;
        const range =
          minValue !== null && maxValue !== null ? Math.max(maxValue - minValue, Math.abs(maxValue) * 0.1, 1) : null;
        const paddedMin = minValue !== null && range !== null ? Math.max(minValue - range * 0.1, 0) : undefined;
        const paddedMax = maxValue !== null && range !== null ? maxValue + range * 0.1 : undefined;

        const positiveValues = values.filter((v) => v > 0);
        const minValueLog = positiveValues.length ? Math.min(...positiveValues) : null;
        const maxValueLog = positiveValues.length ? Math.max(...positiveValues) : null;
        const paddedMinLog = minValueLog !== null ? Math.max(minValueLog * 0.8, minValueLog * 0.1, 1e-9) : undefined;
        const paddedMaxLog = maxValueLog !== null ? maxValueLog * 1.1 : undefined;

        if (!bitaxeBestChart) {
          const ctx = bitaxeBestChartCanvas.getContext("2d");
          bitaxeBestChart = new Chart(ctx, {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  label: "Best session difficulty (linear)",
                  data,
                  borderColor: "#a78bfa",
                  backgroundColor: "rgba(167, 139, 250, 0.2)",
                  tension: 0.25,
                  pointRadius: 3,
                  pointHoverRadius: 5,
                  spanGaps: true,
                  yAxisID: "y",
                },
                {
                  label: "Best session difficulty (log)",
                  data: dataLog,
                  borderColor: "#22d3ee",
                  backgroundColor: "rgba(34, 211, 238, 0.2)",
                  tension: 0.25,
                  pointRadius: 0,
                  pointHoverRadius: 4,
                  spanGaps: true,
                  yAxisID: "yLog",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              parsing: false,
              interaction: {
                mode: "nearest",
                intersect: false,
              },
              plugins: {
                legend: { labels: { color: "#cbd5f5" } },
                tooltip: {
                  callbacks: {
                    label(ctx) {
                      const chart = ctx.chart;
                      const pointsRef = chart?.$bitaxePoints || [];
                      const item = pointsRef[ctx.dataIndex];
                      const value = item?.display || formatDifficulty(ctx.parsed.y);
                      const label = ctx.label ? ` @ ${ctx.label}` : "";
                      return `Best: ${value}${label}`;
                    },
                  },
                },
              },
              scales: {
                x: {
                  type: "time",
                  time: { displayFormats: { hour: "MMM dd HH:mm", day: "MMM dd" } },
                  ticks: { color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.2)" },
                },
                y: {
                  type: "linear",
                  min: paddedMin,
                  suggestedMin: paddedMin,
                  max: paddedMax,
                  suggestedMax: paddedMax,
                  ticks: {
                    color: "#a78bfa",
                    callback: (value) => formatDifficulty(value),
                  },
                  grid: { color: "rgba(148, 163, 184, 0.15)" },
                },
                yLog: {
                  type: "logarithmic",
                  position: "right",
                  min: paddedMinLog,
                  suggestedMin: paddedMinLog,
                  max: paddedMaxLog,
                  suggestedMax: paddedMaxLog,
                  ticks: {
                    color: "#22d3ee",
                    callback: (value) => formatDifficulty(value),
                  },
                  grid: { drawOnChartArea: false, color: "rgba(34, 211, 238, 0.25)" },
                },
              },
            },
          });
        }

        bitaxeBestChart.data.labels = labels;
        bitaxeBestChart.data.datasets[0].data = data;
        if (bitaxeBestChart.data.datasets[1]) {
          bitaxeBestChart.data.datasets[1].data = dataLog;
        }
        bitaxeBestChart.$bitaxePoints = points;
        if (bitaxeBestChart.options?.scales?.y) {
          bitaxeBestChart.options.scales.y.min = paddedMin;
          bitaxeBestChart.options.scales.y.suggestedMin = paddedMin;
          bitaxeBestChart.options.scales.y.max = paddedMax;
          bitaxeBestChart.options.scales.y.suggestedMax = paddedMax;
        }
        if (bitaxeBestChart.options?.scales?.yLog) {
          bitaxeBestChart.options.scales.yLog.min = paddedMinLog;
          bitaxeBestChart.options.scales.yLog.suggestedMin = paddedMinLog;
          bitaxeBestChart.options.scales.yLog.max = paddedMaxLog;
          bitaxeBestChart.options.scales.yLog.suggestedMax = paddedMaxLog;
        }
        bitaxeBestChart.update("none");
      }

      function updatePiChart(history, internetHistory) {
        if (!piChartCanvas || !piChartWrapper) return;
        const points = normalizeHistory(history);
        if (!points.length) {
          piChartWrapper.style.display = "none";
          if (piChart) {
            piChart.data.labels = [];
            piChart.data.datasets.forEach((dataset) => (dataset.data = []));
            applyStatusOverlay(piChart, { offlineSpans: [], powerSpans: [] });
            piChart.update("none");
          }
          updateStatusLegend({ offlineSpans: [], powerSpans: [] });
          return;
        }

        piChartWrapper.style.display = "block";
        const series = buildPiSeries(points, internetHistory);
        const datasets = createPiDatasets(series);
        const overlay = buildStatusOverlay(points);
        if (piChart) {
          piChart.$statusOverlayOnTop = false;
          piChart.$statusOverlayEmphasis = false;
        }

        if (!piChart) {
          const ctx = piChartCanvas.getContext("2d");
          piChart = new Chart(ctx, {
            type: "line",
            data: {
              labels: series.labels,
              datasets,
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: {
                mode: "index",
                intersect: false,
              },
              plugins: {
                legend: {
                  labels: { color: "#cbd5f5" },
                },
              },
              scales: {
                x: {
                  type: "time",
                  time: { tooltipFormat: "HH:mm", displayFormats: { minute: "HH:mm" } },
                  ticks: { color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.2)" },
                },
                temp: {
                  type: "linear",
                  position: "left",
                  title: { display: true, text: "°C", color: "#94a3b8" },
                  ticks: { color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.2)" },
                },
                percent: {
                  type: "linear",
                  position: "right",
                  min: 0,
                  max: 100,
                  title: { display: true, text: "%", color: "#94a3b8" },
                  ticks: { color: "#94a3b8" },
                  grid: { drawOnChartArea: false },
                },
                speed: {
                  type: "linear",
                  position: "right",
                  offset: true,
                  min: 0,
                  title: { display: true, text: "KB/s", color: "#facc15" },
                  ticks: { color: "#facc15" },
                  grid: { drawOnChartArea: false },
                },
              },
            },
          });
          piChart.$statusOverlayOnTop = false;
          piChart.$statusOverlayEmphasis = false;
          applyStatusOverlay(piChart, overlay);
          piChart.update("none");
        } else {
          piChart.data.labels = series.labels;
          piChart.data.datasets.forEach((dataset, idx) => {
            dataset.data = datasets[idx].data;
          });
          applyStatusOverlay(piChart, overlay);
          piChart.update("none");
        }
        updateStatusLegend(overlay);
      }

      function updatePiFullChart(history, internetHistory) {
        if (!piFullChartCanvas || !piFullChartContainer) return;
        const labels = Array.isArray(history?.labels) ? history.labels : [];
        if (!labels.length) {
          piFullChartContainer.style.display = "none";
          if (piFullChart) {
            piFullChart.data.labels = [];
            piFullChart.data.datasets.forEach((dataset) => (dataset.data = []));
            applyStatusOverlay(piFullChart, { offlineSpans: [], powerSpans: [] });
            piFullChart.update("none");
          }
          return;
        }
        if (piFullChart && piFullChart.data?.labels) {
          const lastIncoming = labels[labels.length - 1];
          const lastChart = piFullChart.data.labels[piFullChart.data.labels.length - 1];
          const lastIncomingTs = lastIncoming ? new Date(lastIncoming).getTime() : null;
          const lastChartTs =
            lastChart instanceof Date ? lastChart.getTime() : new Date(lastChart).getTime();
          if (
            lastIncomingTs &&
            lastChartTs &&
            labels.length === piFullChart.data.labels.length &&
            lastIncomingTs === lastChartTs
          ) {
            piFullChartContainer.style.display = "block";
            return;
          }
        }

        const points = normalizeHistory(history);
        if (!points.length) {
          piFullChartContainer.style.display = "none";
          if (piFullChart) {
            piFullChart.data.labels = [];
            piFullChart.data.datasets.forEach((dataset) => (dataset.data = []));
            piFullChart.update("none");
          }
          return;
        }

        piFullChartContainer.style.display = "block";
        const series = buildPiSeries(points, internetHistory);
        const datasets = createPiDatasets(series);
        const overlay = buildStatusOverlay(points);
        if (piFullChart) {
          piFullChart.$statusOverlayOnTop = true;
          piFullChart.$statusOverlayEmphasis = true;
        }

        if (!piFullChart) {
          const ctx = piFullChartCanvas.getContext("2d");
          piFullChart = new Chart(ctx, {
            type: "line",
            data: {
              labels: series.labels,
              datasets,
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              parsing: false,
              interaction: {
                mode: "nearest",
                intersect: false,
              },
              elements: {
                point: { radius: 0 },
              },
              plugins: {
                legend: {
                  labels: { color: "#cbd5f5", boxWidth: 12 },
                },
                decimation: {
                  enabled: true,
                  algorithm: "lttb",
                  samples: 300,
                },
              },
              scales: {
                x: {
                  type: "time",
                  time: { displayFormats: { hour: "dd HH:mm" } },
                  ticks: { color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.15)" },
                },
                temp: {
                  type: "linear",
                  position: "left",
                  title: { display: true, text: "°C", color: "#94a3b8" },
                  ticks: { color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.15)" },
                },
                percent: {
                  type: "linear",
                  position: "right",
                  min: 0,
                  max: 100,
                  title: { display: true, text: "%", color: "#94a3b8" },
                  ticks: { color: "#94a3b8" },
                  grid: { drawOnChartArea: false },
                },
                speed: {
                  type: "linear",
                  position: "right",
                  offset: true,
                  min: 0,
                  title: { display: true, text: "KB/s", color: "#facc15" },
                  ticks: { color: "#facc15" },
                  grid: { drawOnChartArea: false },
                },
              },
            },
          });
          piFullChart.$statusOverlayOnTop = true;
          piFullChart.$statusOverlayEmphasis = true;
          applyStatusOverlay(piFullChart, overlay);
          piFullChart.update("none");
        } else {
          piFullChart.data.labels = series.labels;
          piFullChart.data.datasets.forEach((dataset, idx) => {
            dataset.data = datasets[idx].data;
          });
          applyStatusOverlay(piFullChart, overlay);
          piFullChart.update("none");
        }
      }

      function summarizeResponseBody(text, maxLength = 160) {
        if (!text) return "";
        return text.replace(/\s+/g, " ").trim().slice(0, maxLength);
      }

      async function parseApiJson(response, label) {
        const bodyText = await response.text();
        let payload = {};
        if (bodyText) {
          try {
            payload = JSON.parse(bodyText);
          } catch (err) {
            const snippet = summarizeResponseBody(bodyText) || err.message || "invalid JSON";
            throw new Error(
              `${label || "API"} returned an invalid response (${response.status}): ${snippet}`
            );
          }
        }

        if (!response.ok) {
          const details =
            payload?.error ||
            payload?.message ||
            payload?.detail ||
            `${response.status} ${response.statusText || ""}`.trim();
          throw new Error(`${label || "API"}: ${details}`);
        }

        return payload;
      }

      function renderError(message) {
        if (message) {
          errorBox.style.display = "block";
          errorBox.textContent = message;
        } else {
          errorBox.style.display = "none";
          errorBox.textContent = "";
        }
      }

      async function refresh() {
        try {
          const query = authToken ? `?token=${encodeURIComponent(authToken)}` : "";
          const response = await fetch(`api/prices${query}`);
          const payload = await parseApiJson(response, "Dashboard API");

          renderRows(payload.data || []);
          renderSystem(payload.system);
          updateBitaxeBestChart(payload.bitaxe_best_history);
          renderPi(payload.pi);
          updatePiChart(payload.pi_history, payload.internet_monitor_history);
          updatePiFullChart(payload.pi_history_full, payload.internet_monitor_history);
          renderQuote(payload.quote);
          renderError(payload.error || "");
          updatedAt.textContent = new Date(payload.updated_at).toLocaleTimeString("en-US", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        } catch (err) {
          renderError(err.message);
        }
      }

      async function refreshPortBlock() {
        try {
          const query = authToken ? `?token=${encodeURIComponent(authToken)}` : "";
          const response = await fetch(`api/port-block${query}`);
          const payload = await parseApiJson(response, "UFW API");
          renderPortBlock(payload.port_block);
        } catch (err) {
          if (portBlockError) {
            portBlockError.style.display = "block";
            portBlockError.textContent = err.message;
          }
        }
      }

      renderRows(initialData || []);
      renderSystem(initialSystem);
      updateBitaxeBestChart(initialBitaxeBestHistory);
      renderPi(initialPi);
      updatePiChart(initialPiHistory, initialInternetMonitorHistory);
      updatePiFullChart(initialPiHistoryFull, initialInternetMonitorHistory);
      renderQuote(initialQuote);
      renderPortBlock(initialPortBlock);
      renderError(initialError);

      refresh();
      setInterval(refresh, 10000);
      setInterval(refreshPortBlock, PORT_BLOCK_REFRESH_MS);
      refreshPortBlock();
    </script>
  </body>
</html>
